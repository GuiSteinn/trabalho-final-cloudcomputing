name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Baixa o código do repositório para o ambiente temporário do GitHub Actions.
      - name: Checkout do código
        uses: actions/checkout@v4

      # Configura a versão do Python usada pela API e pelos testes unitários.
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # A API usa apenas biblioteca padrão, então não há dependências externas.
      - name: Instalar dependências
        run: python -m pip install --upgrade pip

      # Etapa adicional: valida a sintaxe dos arquivos Python antes dos testes.
      - name: Análise estática básica
        run: python -m compileall api

      # Executa os quatro testes unitários exigidos pelo enunciado.
      - name: Executar testes unitários
        run: python -m unittest discover -s api/tests
